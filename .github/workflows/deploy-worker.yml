name: Deploy Worker

on:
  push:
    branches: [main]
    paths:
      - "worker/**"

permissions:
  contents: read

concurrency:
  group: deploy-worker-production
  cancel-in-progress: false

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: worker/package-lock.json

      - name: Install dependencies
        run: npm ci
        working-directory: worker

      - name: Typecheck
        run: npm run typecheck
        working-directory: worker

      - name: Test
        run: npm test
        working-directory: worker

  deploy:
    needs: verify
    runs-on: ubuntu-latest
    environment: worker-production
    steps:
      - uses: actions/checkout@v4

      - name: Check deployment credentials
        id: credentials
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: |
          if [ -n "$CLOUDFLARE_API_TOKEN" ] && [ -n "$CLOUDFLARE_ACCOUNT_ID" ]; then
            echo "configured=true" >> "$GITHUB_OUTPUT"
          else
            echo "configured=false" >> "$GITHUB_OUTPUT"
            echo "::warning::Worker deploy skipped: configure CLOUDFLARE_API_TOKEN and CLOUDFLARE_ACCOUNT_ID in worker-production."
          fi

      - uses: actions/setup-node@v4
        if: steps.credentials.outputs.configured == 'true'
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: worker/package-lock.json

      - name: Install dependencies
        if: steps.credentials.outputs.configured == 'true'
        run: npm ci
        working-directory: worker

      - name: Deploy to Cloudflare
        if: steps.credentials.outputs.configured == 'true'
        run: npx wrangler deploy
        working-directory: worker
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
