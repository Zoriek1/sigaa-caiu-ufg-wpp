name: sigaa-evolution

services:
  postgres:
    image: postgres:15.18-alpine3.23@sha256:3889f6e66267065437b17a404058a6220d9080c73b701edd225770f8b2d6a52c
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DATABASE}
      POSTGRES_USER: ${POSTGRES_USERNAME}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - backend
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 20s
    security_opt:
      - no-new-privileges:true

  redis:
    image: redis:7.4.9-alpine3.21@sha256:6ab0b6e7381779332f97b8ca76193e45b0756f38d4c0dcda72dbb3c32061ab99
    restart: unless-stopped
    command:
      - redis-server
      - --appendonly
      - "yes"
      - --requirepass
      - ${REDIS_PASSWORD}
    volumes:
      - redis_data:/data
    networks:
      - backend
    healthcheck:
      test: ["CMD-SHELL", "redis-cli -a \"$${REDIS_PASSWORD}\" ping | grep -q PONG"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 10s
    environment:
      REDIS_PASSWORD: ${REDIS_PASSWORD}
    security_opt:
      - no-new-privileges:true

  evolution:
    image: evoapicloud/evolution-api:v2.3.7@sha256:1bd8afc4a6cf48822e6cf02469aeae7bd35a12a6b616eacd1291926307f4d339
    restart: unless-stopped
    env_file:
      - ${EVOLUTION_ENV_FILE:-.env}
    environment:
      SERVER_NAME: sigaa-caiu-ufg
      SERVER_TYPE: http
      SERVER_PORT: "8080"
      SERVER_URL: ${EVOLUTION_PUBLIC_URL}
      SERVER_DISABLE_DOCS: "true"
      SERVER_DISABLE_MANAGER: "false"
      AUTHENTICATION_API_KEY: ${AUTHENTICATION_API_KEY}
      AUTHENTICATION_EXPOSE_IN_FETCH_INSTANCES: "false"
      DATABASE_PROVIDER: postgresql
      DATABASE_CONNECTION_URI: postgresql://${POSTGRES_USERNAME}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DATABASE}
      DATABASE_CONNECTION_CLIENT_NAME: sigaa-caiu-ufg
      DATABASE_SAVE_DATA_INSTANCE: "true"
      DATABASE_SAVE_DATA_NEW_MESSAGE: "false"
      DATABASE_SAVE_MESSAGE_UPDATE: "false"
      DATABASE_SAVE_DATA_CONTACTS: "false"
      DATABASE_SAVE_DATA_CHATS: "false"
      DATABASE_SAVE_DATA_HISTORIC: "false"
      DATABASE_SAVE_DATA_LABELS: "false"
      DATABASE_SAVE_IS_ON_WHATSAPP: "false"
      CACHE_REDIS_ENABLED: "true"
      CACHE_REDIS_URI: redis://default:${REDIS_PASSWORD}@redis:6379/0
      CACHE_REDIS_PREFIX_KEY: sigaa-caiu-ufg
      CACHE_REDIS_TTL: "604800"
      CACHE_REDIS_SAVE_INSTANCES: "true"
      CACHE_LOCAL_ENABLED: "false"
      LOG_LEVEL: ERROR,WARN,INFO
      DEL_INSTANCE: "false"
      QRCODE_LIMIT: "30"
      TELEMETRY_ENABLED: "false"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    ports:
      - 127.0.0.1:${EVOLUTION_LOCAL_PORT:-8080}:8080
    volumes:
      - evolution_instances:/evolution/instances
    networks:
      - backend
      - edge
    healthcheck:
      test:
        - CMD
        - node
        - -e
        - fetch('http://127.0.0.1:8080/server/ok').then(r=>{if(!r.ok)process.exit(1)}).catch(()=>process.exit(1))
      interval: 15s
      timeout: 10s
      retries: 20
      start_period: 60s
    security_opt:
      - no-new-privileges:true

  dashboard-bootstrap:
    image: nginx:1.31.2-alpine@sha256:54f2a904c251d5a34adf545a72d32515a15e08418dae0266e23be2e18c66fefa
    restart: unless-stopped
    environment:
      AUTHENTICATION_API_KEY: ${AUTHENTICATION_API_KEY}
      EVOLUTION_PUBLIC_URL: ${EVOLUTION_PUBLIC_URL}
      NGINX_ENVSUBST_OUTPUT_DIR: /usr/share/nginx/html
      NGINX_ENVSUBST_TEMPLATE_SUFFIX: .template
    volumes:
      - ./dashboard/index.html.template:/etc/nginx/templates/index.html.template:ro
      - ./dashboard/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    networks:
      - edge
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://127.0.0.1/health"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    security_opt:
      - no-new-privileges:true

  caddy:
    image: caddy:2.11.4-alpine@sha256:5f5c8640aae01df9654968d946d8f1a56c497f1dd5c5cda4cf95ab7c14d58648
    restart: unless-stopped
    environment:
      EVOLUTION_SITE_ADDRESS: ${EVOLUTION_SITE_ADDRESS}
      EVOLUTION_PUBLIC_URL: ${EVOLUTION_PUBLIC_URL}
    depends_on:
      evolution:
        condition: service_healthy
      dashboard-bootstrap:
        condition: service_healthy
    ports:
      - ${CADDY_BIND_ADDRESS:-0.0.0.0}:${CADDY_HTTP_PORT:-80}:80
      - ${CADDY_BIND_ADDRESS:-0.0.0.0}:${CADDY_HTTPS_PORT:-443}:443
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    networks:
      - edge
    healthcheck:
      test: ["CMD", "caddy", "validate", "--config", "/etc/caddy/Caddyfile", "--adapter", "caddyfile"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    security_opt:
      - no-new-privileges:true

networks:
  backend:
    internal: true
  edge:

volumes:
  postgres_data:
  redis_data:
  evolution_instances:
  caddy_data:
  caddy_config:
